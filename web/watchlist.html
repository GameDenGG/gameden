if (window.GameDenSite && typeof window.GameDenSite.applyMetadata === "function") {
    window.GameDenSite.applyMetadata({
        path: "/watchlist",
        title: "GameDen.gg - Watchlist",

        ogTitle: "GameDen.gg - Watchlist",

if (window.GameDenSite && window.GameDenSite.skeleton && typeof window.GameDenSite.skeleton.ensureStyles === "function") {

<style>
:root {
    --bg: #050913;
    --panel: rgba(10, 20, 38, 0.92);
    --line: rgba(130, 173, 247, 0.24);
    --text: #eff6ff;
    --muted: #9eb8e7;
    --accent: #6fe8ff;
    --good: #5ce4a9;
    --warn: #ffc77a;
    --radius: 18px;
    --shadow: 0 18px 40px rgba(2, 8, 20, 0.38);
}

* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
    color: var(--text);
    background:
        radial-gradient(900px 540px at 4% -10%, rgba(103, 234, 255, 0.16), transparent 60%),
        radial-gradient(980px 700px at 98% 6%, rgba(188, 168, 255, 0.16), transparent 58%),
        linear-gradient(180deg, #050913 0%, #040a16 100%);
}

.page {
    max-width: 1180px;
    margin: 0 auto;
    padding: 24px 18px 40px;
}

.topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    margin-bottom: 18px;
}

.brand {
    display: inline-flex;
    align-items: center;
    gap: 10px;
}

.brand-text {
    font-size: 24px;
    font-weight: 800;
    letter-spacing: 0.01em;
    line-height: 1;
    color: var(--text);
}

.brand-title {
    font-size: 18px;
    font-weight: 800;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--muted);
}

.sr-only {
    position: absolute;
    width: 1px;
    height: 1px;
    padding: 0;
    margin: -1px;
    overflow: hidden;
    clip-path: inset(50%);
    border: 0;
    white-space: nowrap;
}

.actions {
    display: inline-flex;
    gap: 10px;
}

.btn {
    border: 1px solid var(--line);
    background: rgba(121, 168, 255, 0.1);
    color: var(--text);
    padding: 10px 12px;
    border-radius: 12px;
    font-weight: 700;
    cursor: pointer;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition:
        transform 0.15s ease,
        border-color 0.18s ease,
        background 0.18s ease,
        box-shadow 0.18s ease,
        color 0.18s ease,
        opacity 0.18s ease;
    will-change: transform;
}

.btn:hover {
    border-color: rgba(121, 168, 255, 0.58);
    background: rgba(121, 168, 255, 0.16);
    box-shadow: 0 10px 20px rgba(2, 8, 20, 0.22);
    transform: translateY(-1px);
}

.btn:active {
    transform: scale(0.98);
}

.btn:focus-visible {
    outline: 2px solid rgba(121, 222, 255, 0.88);
    outline-offset: 2px;
}

.btn.is-pending {
    opacity: 0.68;
    cursor: progress;
}

.btn.is-action-success {
    animation: watchlistActionPulse 0.62s ease-out 1;
}

@keyframes watchlistActionPulse {
    0% {
        box-shadow:
            0 0 0 0 rgba(121, 168, 255, 0),
            0 0 0 0 rgba(121, 168, 255, 0);
    }
    45% {
        box-shadow:
            0 0 0 1px rgba(121, 168, 255, 0.32),
            0 0 14px rgba(121, 168, 255, 0.22);
    }
    100% {
        box-shadow:
            0 0 0 0 rgba(121, 168, 255, 0),
            0 0 0 0 rgba(121, 168, 255, 0);
    }
}

.hero {
    border-radius: 24px;
    border: 1px solid var(--line);
    background:
        radial-gradient(circle at 90% 8%, rgba(103, 234, 255, 0.2), transparent 36%),
        linear-gradient(170deg, rgba(15, 28, 52, 0.96), rgba(8, 16, 29, 0.96));
    padding: 24px;
    margin-bottom: 18px;
    box-shadow: var(--shadow);
}

.hero h1 {
    margin: 0 0 8px;
    font-size: clamp(32px, 5vw, 52px);
    line-height: 0.95;
    letter-spacing: -0.04em;
}

.hero p {
    margin: 0;
    color: var(--muted);
    line-height: 1.55;
}

.meta-row {
    margin-top: 14px;
    color: var(--muted);
    font-size: 13px;
}

.view-toggle {
    display: inline-flex;
    gap: 8px;
    margin: 0 0 14px;
    padding: 4px;
    border-radius: 12px;
    border: 1px solid var(--line);
    background: rgba(121, 168, 255, 0.06);
}

.view-toggle .btn {
    min-width: 132px;
}

.view-toggle .btn.is-active {
    border-color: rgba(121, 222, 255, 0.7);
    background: rgba(121, 222, 255, 0.22);
    color: #ecf9ff;
}

.grid {
    display: grid;
    gap: 14px;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
}

.card {
    border-radius: var(--radius);
    border: 1px solid var(--line);
    background: linear-gradient(180deg, rgba(14, 27, 48, 0.95), rgba(9, 17, 31, 0.95));
    box-shadow: var(--shadow);
    overflow: hidden;
}

.thumb {
    display: block;
    height: 132px;
    background: linear-gradient(180deg, rgba(97, 165, 250, 0.22), rgba(97, 165, 250, 0.08));
    background-size: cover;
    background-position: center;
    border-bottom: 1px solid rgba(121, 168, 255, 0.18);
}

.body {
    padding: 14px;
    display: grid;
    gap: 10px;
}

.name {
    margin: 0;
    font-size: 18px;
    line-height: 1.2;
    letter-spacing: -0.02em;
    overflow-wrap: anywhere;
}

.metrics {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 8px;
}

.metric {
    border-radius: 12px;
    border: 1px solid rgba(121, 168, 255, 0.18);
    background: rgba(255, 255, 255, 0.03);
    padding: 8px;
}

.metric-label {
    color: var(--muted);
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.07em;
}

.metric-value {
    margin-top: 4px;
    font-weight: 800;
}

.signals {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
}

.signal {
    padding: 6px 9px;
    border-radius: 999px;
    border: 1px solid rgba(121, 168, 255, 0.24);
    background: rgba(121, 168, 255, 0.1);
    font-size: 11px;
    font-weight: 700;
}

.signal.good { background: rgba(92, 228, 169, 0.15); border-color: rgba(92, 228, 169, 0.34); }
.signal.warn { background: rgba(255, 199, 122, 0.18); border-color: rgba(255, 199, 122, 0.36); }

.card-actions {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
}

.empty,
.error,
.loading {
    border-radius: 16px;
    border: 1px solid var(--line);
    background: var(--panel);
    padding: 16px;
    color: var(--muted);
}

.error {
    border-color: rgba(248, 113, 113, 0.35);
    color: #ffd9df;
}

@media (prefers-reduced-motion: reduce) {
    .btn.is-action-success {
        animation: none;
    }

    .btn {
        transition: border-color 0.18s ease, background 0.18s ease, box-shadow 0.18s ease, color 0.18s ease, opacity 0.18s ease;
    }

    .btn:hover,
    .btn:active {
        transform: none;
    }
}

@media (max-width: 980px) {
    .page {
        padding: 20px 16px 32px;
    }

    .hero h1 {
        font-size: clamp(28px, 6.5vw, 40px);
    }

    .grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
    }

    .body {
        padding: 12px;
        gap: 8px;
    }

    .name {
        font-size: 17px;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
    }

    .metrics {
        grid-template-columns: repeat(2, minmax(0, 1fr));
    }
}

@media (max-width: 720px) {
    .topbar {
        flex-direction: column;
        align-items: flex-start;
    }

    .page {
        padding: 16px 12px 26px;
    }

    .topbar {
        margin-bottom: 14px;
        gap: 10px;
    }

    .brand {
        gap: 8px;
    }

    .brand-text {
        font-size: 21px;
    }

    .brand-title {
        font-size: 15px;
    }

    .actions {
        width: 100%;
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
    }

    .actions .btn {
        width: 100%;
        padding: 9px 10px;
    }

    .hero {
        padding: 18px 16px;
        border-radius: 18px;
        margin-bottom: 14px;
    }

    .hero h1 {
        font-size: clamp(25px, 9vw, 32px);
        line-height: 1;
    }

    .hero p {
        font-size: 14px;
        line-height: 1.45;
    }

    .meta-row {
        margin-top: 10px;
        font-size: 12px;
    }

    .view-toggle {
        width: 100%;
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .view-toggle .btn {
        width: 100%;
        min-width: 0;
    }

    .grid {
        grid-template-columns: 1fr;
        gap: 10px;
    }

    .thumb {
        height: 116px;
    }

    .body {
        padding: 11px;
        gap: 8px;
    }

    .name {
        font-size: 16px;
        line-height: 1.25;
    }

    .metrics {
        gap: 7px;
    }

    .metric {
        padding: 7px;
    }

    .metric-label {
        font-size: 10px;
    }

    .metric-value {
        margin-top: 3px;
        font-size: 13px;
    }

    .signals {
        gap: 6px;
    }

    .signal {
        padding: 5px 8px;
        font-size: 10px;
    }

    .card-actions {
        flex-wrap: wrap;
        gap: 8px;
    }

    .card-actions .btn {
        flex: 1 1 calc(50% - 4px);
    }
}

@media (max-width: 460px) {
    .actions {
        grid-template-columns: 1fr;
    }

    .metrics {
        grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .card-actions .btn {
        flex: 1 1 100%;
    }
}
</style>

<body>
<div class="page">
    <div class="topbar">
    <div class="brand" aria-label="GameDen.gg Tracked Items">
        <span class="brand-text">GameDen.gg</span>
        <span class="brand-title">Tracked Items</span>
    </div>
        <div class="actions">
            <button class="btn" id="refreshBtn" type="button">Refresh</button>
            <a class="btn" id="openWatchlistBtn" href="/watchlist?tab=watchlist">Open Watchlist</a>
            <a class="btn" id="openWishlistBtn" href="/watchlist?tab=wishlist">Open Wishlist</a>
            <a class="btn" href="/">Back to dashboard</a>
        </div>
    </div>

    <section class="hero">
        <h1>Track What Matters</h1>
        <p>Watchlist and wishlist entries are unified here so tracked games stay in one coherent, snapshot-backed workflow.</p>
        <div class="meta-row">User scope: <strong id="userScope"><span class="gd-skeleton-block gd-skeleton-line gd-skeleton-w-30" aria-hidden="true"></span></strong></div>
    </section>

    <nav class="view-toggle" id="viewToggle" aria-label="Tracked items view">
        <a class="btn" id="watchTabBtn" href="/watchlist?tab=watchlist">Watchlist</a>
        <a class="btn" id="wishTabBtn" href="/watchlist?tab=wishlist">Wishlist</a>
    </nav>

    <section id="content"></section>
</div>

<script>
const WATCHLIST_STORAGE_KEY = "gameden.user_id";
const DASHBOARD_SNAPSHOT_STORAGE_KEY = "gameden.dashboard.snapshot.v1";
const TRACKED_SYNC_STORAGE_KEY = "gameden.tracked.sync.v1";
const AUTH_SYNC_STORAGE_KEY = "gameden.auth.sync.v1";
const TRACKED_TAB_WATCHLIST = "watchlist";
const TRACKED_TAB_WISHLIST = "wishlist";

function getCurrentUserId() {
    const runtime = window.GameDenSite;
    if (runtime && typeof runtime.getViewerId === "function") {
        const runtimeViewerId = String(runtime.getViewerId() || "").trim();
        if (runtimeViewerId) return runtimeViewerId;
    }
    const createFallbackViewerId = () => {
        if (window.crypto && typeof window.crypto.randomUUID === "function") {
            return `anon_${String(window.crypto.randomUUID()).replaceAll("-", "").toLowerCase()}`;
        }
        const entropy = `${Date.now().toString(16)}${Math.floor(Math.random() * 1e12).toString(16)}`.slice(0, 32);
        return `anon_${entropy.padEnd(32, "0")}`;
    };
    try {
        const stored = String(localStorage.getItem(WATCHLIST_STORAGE_KEY) || "").trim();
        const normalizedStored = stored.toLowerCase();
        if (
            stored
            && normalizedStored !== "legacy-user"
            && normalizedStored !== "anonymous"
            && normalizedStored !== "guest"
        ) {
            return stored;
        }
        const nextId = createFallbackViewerId();
        localStorage.setItem(WATCHLIST_STORAGE_KEY, nextId);
        return nextId;
    } catch {
        return createFallbackViewerId();
    }
}

let CURRENT_USER_ID = getCurrentUserId();
const urlParams = new URLSearchParams(window.location.search || "");
const ACTIVE_TAB = String(urlParams.get("tab") || TRACKED_TAB_WATCHLIST).trim().toLowerCase() === TRACKED_TAB_WISHLIST
    ? TRACKED_TAB_WISHLIST
    : TRACKED_TAB_WATCHLIST;
const contentEl = document.getElementById("content");
const watchTabBtn = document.getElementById("watchTabBtn");
const wishTabBtn = document.getElementById("wishTabBtn");
const openWatchlistBtn = document.getElementById("openWatchlistBtn");
const openWishlistBtn = document.getElementById("openWishlistBtn");
const skeletonUi = window.GameDenSite && window.GameDenSite.skeleton;
let loadWatchlistRequestId = 0;

if (skeletonUi && typeof skeletonUi.ensureStyles === "function") {
    skeletonUi.ensureStyles();
}

function renderWatchlistSkeleton() {
    if (skeletonUi && typeof skeletonUi.markup === "function") {
        contentEl.innerHTML = `<div class="loading">Loading tracked items…</div><div class="grid">${skeletonUi.markup("watchlist-cards", 6, { cardClass: "card" })}</div>`;
        return;
    }
    contentEl.innerHTML = `<div class="loading">Loading tracked items…</div>`;
}

function syncTabUi() {
    if (watchTabBtn) watchTabBtn.classList.toggle("is-active", ACTIVE_TAB === TRACKED_TAB_WATCHLIST);
    if (wishTabBtn) wishTabBtn.classList.toggle("is-active", ACTIVE_TAB === TRACKED_TAB_WISHLIST);
    if (openWatchlistBtn) openWatchlistBtn.classList.toggle("is-active", ACTIVE_TAB === TRACKED_TAB_WATCHLIST);
    if (openWishlistBtn) openWishlistBtn.classList.toggle("is-active", ACTIVE_TAB === TRACKED_TAB_WISHLIST);
}

function normalizeWatchlistItems(payload) {
    return Array.isArray(payload?.items) ? payload.items : [];
}

function normalizeWishlistItems(payload) {
    return Array.isArray(payload) ? payload : [];
}

function patchDashboardSnapshotTrackedList(action, list, gameId) {
    const normalizedAction = String(action || "").trim().toLowerCase();
    const normalizedList = String(list || "").trim().toLowerCase();
    const normalizedGameId = Number(gameId);
    if (!(normalizedAction === "remove" || normalizedAction === "add")) return;
    if (!(normalizedList === TRACKED_TAB_WATCHLIST || normalizedList === TRACKED_TAB_WISHLIST)) return;
    if (!Number.isFinite(normalizedGameId) || normalizedGameId <= 0) return;
    try {
        const raw = sessionStorage.getItem(DASHBOARD_SNAPSHOT_STORAGE_KEY);
        if (!raw) return;
        const snapshot = JSON.parse(raw);
        if (!snapshot || typeof snapshot !== "object") return;
        const snapshotUserId = String(snapshot.user_id || "").trim();
        if (!snapshotUserId || snapshotUserId !== CURRENT_USER_ID) return;
        const sections = snapshot.sections && typeof snapshot.sections === "object" ? snapshot.sections : {};
        const current = Array.isArray(sections[normalizedList]) ? sections[normalizedList] : [];
        if (normalizedAction === "remove") {
            sections[normalizedList] = current.filter((entry) => {
                const entryId = Number(entry?.game_id ?? entry?.id ?? 0);
                return !(Number.isFinite(entryId) && entryId > 0 && entryId === normalizedGameId);
            });
        }
        snapshot.sections = sections;
        snapshot.saved_at = Date.now();
        sessionStorage.setItem(DASHBOARD_SNAPSHOT_STORAGE_KEY, JSON.stringify(snapshot));
    } catch {
        // Ignore storage sync failures.
    }
}

function emitTrackedSync(action, list, gameId) {
    const normalizedAction = String(action || "").trim().toLowerCase();
    const normalizedList = String(list || "").trim().toLowerCase();
    const normalizedGameId = Number(gameId);
    if (!(normalizedAction === "remove" || normalizedAction === "add")) return;
    if (!(normalizedList === TRACKED_TAB_WATCHLIST || normalizedList === TRACKED_TAB_WISHLIST)) return;
    if (!Number.isFinite(normalizedGameId) || normalizedGameId <= 0) return;
    try {
        const payload = {
            action: normalizedAction,
            list: normalizedList,
            game_id: Math.trunc(normalizedGameId),
            user_id: CURRENT_USER_ID,
            ts: Date.now(),
        };
        localStorage.setItem(TRACKED_SYNC_STORAGE_KEY, JSON.stringify(payload));
    } catch {
        // Ignore storage sync failures.
    }
}

function parseAccountSyncPayload(rawValue) {
    if (!rawValue) return null;
    try {
        const parsed = JSON.parse(rawValue);
        if (!parsed || typeof parsed !== "object") return null;
        const ts = Number(parsed.ts || 0);
        if (!Number.isFinite(ts) || ts <= 0) return null;
        return {
            ts,
            user_id: String(parsed.user_id || "").trim(),
            previous_user_id: String(parsed.previous_user_id || "").trim(),
            type: String(parsed.type || "").trim().toLowerCase(),
        };
    } catch {
        return null;
    }
}

async function refreshIdentityAndReload() {
    const runtime = window.GameDenSite;
    const previousUserId = String(CURRENT_USER_ID || "").trim();
    if (window.GameDenAccount && typeof window.GameDenAccount.syncIdentityFromSession === "function") {
        try {
            await window.GameDenAccount.syncIdentityFromSession();
        } catch {
            // Continue with best-effort fallback.
        }
    }
    const nextUserId = runtime && typeof runtime.getViewerId === "function"
        ? String(runtime.getViewerId() || "").trim()
        : getCurrentUserId();
    if (!nextUserId || nextUserId === previousUserId) return false;
    CURRENT_USER_ID = nextUserId;
    return true;
}

function escapeHtml(value) {
    return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
}

function fmtPrice(value) {
    const n = Number(value);
    if (!Number.isFinite(n)) return "—";
    return `$${n.toFixed(2)}`;
}

function signalTone(signal) {
    const type = String(signal?.type || "").toUpperCase();
    if (type.includes("TARGET_HIT")) return "good";
    if (type.includes("LOW") || type.includes("BUY")) return "good";
    if (type.includes("SALE") || type.includes("DROP")) return "warn";
    return "";
}

function buildAlertMap(alertItems) {
    const byGame = new Map();
    for (const row of Array.isArray(alertItems) ? alertItems : []) {
        const gameId = Number(row?.game_id || 0);
        if (!Number.isFinite(gameId) || gameId <= 0) continue;
        if (!byGame.has(gameId)) byGame.set(gameId, []);
        byGame.get(gameId).push(row);
    }
    return byGame;
}

function renderTrackedState(kind, message, options = {}) {
    const safeKind = kind === "error" ? "error" : kind === "loading" ? "loading" : "empty";
    const safeMessage = escapeHtml(String(message || "").trim() || "No tracked items available.");
    const retryLabel = escapeHtml(String(options?.retryLabel || "Retry").trim() || "Retry");
    const onRetry = typeof options?.onRetry === "function" ? options.onRetry : null;
    const retryToken = onRetry ? String(Date.now()) : "";
    contentEl.innerHTML = `<div class="${safeKind}">${safeMessage}${onRetry ? ` <button class="btn" type="button" data-tracked-retry="${retryToken}">${retryLabel}</button>` : ""}</div>`;
    if (onRetry) {
        const retryButton = contentEl.querySelector(`[data-tracked-retry="${retryToken}"]`);
        if (retryButton instanceof HTMLButtonElement) {
            retryButton.addEventListener("click", () => {
                void onRetry();
            });
        }
    }
}

async function fetchJson(url, options = {}) {
    const runtime = typeof window.getGameDenRuntime === "function"
        ? await window.getGameDenRuntime()
        : window.GameDenSite;
    if (!runtime || typeof runtime.fetchJson !== "function") {
        throw new Error("GameDen runtime is not initialized. Ensure /site-branding.js loads before page scripts.");
    }
    return runtime.fetchJson(url, options);
}

async function ensureAuthRuntimeForCurrentUser() {
    const userId = String(CURRENT_USER_ID || "").trim().toLowerCase();
    if (!userId.startsWith("acct_")) return;
    if (typeof window.getGameDenAuthRuntime === "function") {
        try {
            await window.getGameDenAuthRuntime();
        } catch {
            // Continue with best effort.
        }
    }
}

function setActionPending(button, isPending) {
    if (!(button instanceof HTMLElement)) return;
    const pending = !!isPending;
    button.classList.toggle("is-pending", pending);
    if (button instanceof HTMLButtonElement) {
        button.disabled = pending;
    }
    if (pending) {
        button.setAttribute("aria-busy", "true");
    } else {
        button.removeAttribute("aria-busy");
    }
}

function pulseActionSuccess(button) {
    if (!(button instanceof HTMLElement)) return;
    const reduceMotion = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    if (reduceMotion) return;
    button.classList.remove("is-action-success");
    void button.offsetWidth;
    button.classList.add("is-action-success");
    window.setTimeout(() => {
        button.classList.remove("is-action-success");
    }, 720);
}

async function removeWatch(gameId) {
    const requestedUserId = String(CURRENT_USER_ID || "").trim();
    await ensureAuthRuntimeForCurrentUser();
    if (String(CURRENT_USER_ID || "").trim() !== requestedUserId) return;
    await fetchJson(`/api/watchlist/${encodeURIComponent(gameId)}?user_id=${encodeURIComponent(requestedUserId)}`, {
        method: "DELETE",
    });
}

async function removeWish(gameId) {
    const requestedUserId = String(CURRENT_USER_ID || "").trim();
    await ensureAuthRuntimeForCurrentUser();
    if (String(CURRENT_USER_ID || "").trim() !== requestedUserId) return;
    await fetchJson("/wishlist/remove", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            user_id: requestedUserId,
            game_id: gameId,
        }),
    });
}

function render(items, alertsByGame = new Map(), tab = TRACKED_TAB_WATCHLIST) {
    if (!items.length) {
        renderTrackedState(
            "empty",
            tab === TRACKED_TAB_WISHLIST
                ? "No wishlist games yet. Save games on the dashboard to keep them here."
                : "No watched games yet. Add titles from the homepage or game pages to start tracking signals.",
        );
        return;
    }

    contentEl.innerHTML = `
        <div class="grid">
            ${items.map((item) => {
                const bannerUrl = item.banner_url || item.image_url || item.header_image || item.image || null;
                const bannerStyle = bannerUrl
                    ? ` style="background-image:url('${encodeURI(bannerUrl).replaceAll("'", "%27")}')"`
                    : "";
                const discount = Number(item.latest_discount_percent || 0);
                const watchSignals = tab === TRACKED_TAB_WATCHLIST && Array.isArray(item.signals) ? item.signals : [];
                const alertSignals = alertsByGame.get(Number(item.game_id || 0)) || [];
                const mergedSignals = [...watchSignals];
                const seenSignalLabels = new Set(
                    mergedSignals
                        .map((signal) => String(signal?.label || "").trim().toLowerCase())
                        .filter(Boolean)
                );
                for (const alert of alertSignals) {
                    const label = String(alert?.alert_label || alert?.alert_type || "Market signal").trim();
                    const dedupeKey = label.toLowerCase();
                    if (!label || seenSignalLabels.has(dedupeKey)) continue;
                    seenSignalLabels.add(dedupeKey);
                    mergedSignals.push({
                        type: String(alert?.alert_type || "SIGNAL"),
                        label,
                    });
                }
                const signals = mergedSignals.slice(0, 3);
                const removeAttr = tab === TRACKED_TAB_WISHLIST
                    ? `data-remove-wish="${Number(item.game_id || 0)}"`
                    : `data-remove-watch="${Number(item.game_id || 0)}"`;
                const gameId = Number(item.game_id || 0);
                const runtime = window.GameDenSite;
                const gameHref = runtime && typeof runtime.buildGamePath === "function"
                    ? runtime.buildGamePath(
                        {
                            slug: item.slug ?? item.game_slug,
                            game_id: Number.isFinite(gameId) && gameId > 0 ? Math.trunc(gameId) : null,
                            steam_appid: item.steam_appid ?? item.appid,
                            game_name: item.game_name || "",
                        },
                        { includeNameQuery: false, allowIdFallback: true, allowAppIdFallback: true },
                    )
                    : (() => {
                        const fallbackSlug = String(item.slug ?? item.game_slug ?? item.game_name ?? "")
                            .trim()
                            .toLowerCase()
                            .replace(/[^a-z0-9]+/g, "-")
                            .replace(/^-+|-+$/g, "");
                        if (fallbackSlug) return `/game/${fallbackSlug}`;
                        return Number.isFinite(gameId) && gameId > 0 ? `/game/${Math.trunc(gameId)}` : "/game";
                    })();
                return `
                    <article class="card">
                        <a class="thumb" href="${gameHref}"${bannerStyle}></a>
                        <div class="body">
                            <h2 class="name">${escapeHtml(item.game_name || "Unknown game")}</h2>
                            <div class="metrics">
                                <div class="metric">
                                    <div class="metric-label">Price</div>
                                    <div class="metric-value">${fmtPrice(item.latest_price)}</div>
                                </div>
                                <div class="metric">
                                    <div class="metric-label">Discount</div>
                                    <div class="metric-value">${discount > 0 ? `${discount}%` : "No sale"}</div>
                                </div>
                                <div class="metric">
                                    <div class="metric-label">Buy Score</div>
                                    <div class="metric-value">${Number.isFinite(Number(item.buy_score)) ? Number(item.buy_score).toFixed(1) : "—"}</div>
                                </div>
                            </div>
                            <div class="signals">
                                ${signals.length
                                    ? signals.map((signal) => `<span class="signal ${signalTone(signal)}">${escapeHtml(signal.label || signal.type || "Signal")}</span>`).join("")
                                    : `<span class="signal">${tab === TRACKED_TAB_WISHLIST ? "Wishlisted" : "Watching for new signals"}</span>`}
                            </div>
                            <div class="card-actions">
                                <a class="btn" href="${gameHref}">Open game</a>
                                <button class="btn" type="button" ${removeAttr}>Remove</button>
                            </div>
                        </div>
                    </article>
                `;
            }).join("")}
        </div>
    `;

    contentEl.querySelectorAll("[data-remove-watch]").forEach((button) => {
        button.addEventListener("click", async () => {
            const gameId = Number(button.getAttribute("data-remove-watch") || 0);
            if (!Number.isFinite(gameId) || gameId <= 0) return;
            if (button.disabled || button.classList.contains("is-pending")) return;
            setActionPending(button, true);
            try {
                await removeWatch(gameId);
                patchDashboardSnapshotTrackedList("remove", TRACKED_TAB_WATCHLIST, gameId);
                emitTrackedSync("remove", TRACKED_TAB_WATCHLIST, gameId);
                await loadWatchlist();
            } catch (error) {
                console.error(error);
                setActionPending(button, false);
            }
        });
    });

    contentEl.querySelectorAll("[data-remove-wish]").forEach((button) => {
        button.addEventListener("click", async () => {
            const gameId = Number(button.getAttribute("data-remove-wish") || 0);
            if (!Number.isFinite(gameId) || gameId <= 0) return;
            if (button.disabled || button.classList.contains("is-pending")) return;
            setActionPending(button, true);
            try {
                await removeWish(gameId);
                patchDashboardSnapshotTrackedList("remove", TRACKED_TAB_WISHLIST, gameId);
                emitTrackedSync("remove", TRACKED_TAB_WISHLIST, gameId);
                await loadWatchlist();
            } catch (error) {
                console.error(error);
                setActionPending(button, false);
            }
        });
    });
}

async function loadWatchlist() {
    const requestId = loadWatchlistRequestId + 1;
    loadWatchlistRequestId = requestId;
    const requestedUserId = String(CURRENT_USER_ID || "").trim();
    contentEl.setAttribute("aria-busy", "true");
    document.getElementById("userScope").textContent = requestedUserId;
    renderWatchlistSkeleton();
    try {
        await ensureAuthRuntimeForCurrentUser();
        const [watchlistPayload, wishlistPayload, alertsPayload] = await Promise.all([
            fetchJson(`/api/watchlist?user_id=${encodeURIComponent(requestedUserId)}`),
            fetchJson(`/wishlist/${encodeURIComponent(requestedUserId)}`),
            fetchJson(`/api/alerts?user_id=${encodeURIComponent(requestedUserId)}&limit=120`).catch(() => ({ items: [] })),
        ]);
        if (requestId !== loadWatchlistRequestId || String(CURRENT_USER_ID || "").trim() !== requestedUserId) {
            return false;
        }
        const watchlistItems = normalizeWatchlistItems(watchlistPayload);
        const wishlistItems = normalizeWishlistItems(wishlistPayload);
        const items = ACTIVE_TAB === TRACKED_TAB_WISHLIST ? wishlistItems : watchlistItems;
        const alertsByGame = buildAlertMap(Array.isArray(alertsPayload?.items) ? alertsPayload.items : []);
        render(items, alertsByGame, ACTIVE_TAB);
        return true;
    } catch (error) {
        console.error(error);
        renderTrackedState("error", "Failed to load tracked items.", {
            onRetry: () => loadWatchlist(),
        });
        return false;
    } finally {
        contentEl.setAttribute("aria-busy", "false");
    }
}

document.getElementById("refreshBtn").addEventListener("click", async () => {
    const refreshButton = document.getElementById("refreshBtn");
    if (!(refreshButton instanceof HTMLButtonElement)) return;
    if (refreshButton.disabled || refreshButton.classList.contains("is-pending")) return;
    setActionPending(refreshButton, true);
    const loaded = await loadWatchlist();
    setActionPending(refreshButton, false);
    if (loaded) {
        pulseActionSuccess(refreshButton);
    }
});

syncTabUi();
if (typeof window.getGameDenAuthRuntime === "function") {
    window.getGameDenAuthRuntime()
        .catch(() => null)
        .finally(() => {
            void refreshIdentityAndReload()
                .catch(() => false)
                .finally(() => {
                    void loadWatchlist();
                });
        });
} else {
    void loadWatchlist();
}

window.addEventListener("storage", (event) => {
    if (event.key === AUTH_SYNC_STORAGE_KEY) {
        const payload = parseAccountSyncPayload(event.newValue || "");
        if (payload) {
            void refreshIdentityAndReload().then((changed) => {
                if (changed) {
                    void loadWatchlist();
                }
            }).catch(() => {});
        }
    }
});

window.addEventListener("gameden:account-sync", () => {
    void refreshIdentityAndReload().then((changed) => {
        if (changed) {
            void loadWatchlist();
        }
    }).catch(() => {});
});
</script>
</body>
</html>
